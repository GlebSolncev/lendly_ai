{% extends 'layout/layoutNew.html' %}
{% load static %}


{% block 'head' %}

<title>LandlyAi | The Best Platform To Create Landing Pages With AI</title>
<meta name="description" content="LandlyAi: Create stunning landing pages with AI, optimize design for maximum engagement and conversions effortlessly. Transform your digital presence today!">
<meta name="keywords" content="Create Landing Pages With AI, best landing page platform, landing page builder, landing page with ai, ai landing page generator">

<meta name="google-site-verification" content="o1I7i_Ig4DS5YZ0uHXzyohwBMbXQjbmadb_e7Wfc7yg" />

{% endblock %}



{% block 'body' %}
<!-- Start Hero -->



    <!-- landing page -->
    <div class="landingPage">
        <div class="landingPageDesk">
            
            <div class="landingPageContent notFoundError">
                <h2>404</h2>
                <p>Page not found</p>
            </div>
        </div>

    </div>


</div>
        



<script src="https://js.stripe.com/v3/"></script>
<script type="text/javascript">
  fetch("/config/")
  .then((result) => { return result.json(); })
  .then((data) => {
    const stripe = Stripe(data.publicKey);

    $('.submitSubscription').on("click", function(e) {
      e.preventDefault();
      fetch("/create-checkout-session/" + $(this).attr('data-price') + '/')
      .then((result) => { return result.json(); })
      .then((data) => {
        if (data.error) {
          if (data.error == 'not_auth') {
            window.location = '{% url "login" %}';
          } else {
            console.log(data);
          }
        } else {
          console.log(data);
          return stripe.redirectToCheckout({sessionId: data.sessionId})
        }
      });
    });
  });
</script>
{% endblock %}
