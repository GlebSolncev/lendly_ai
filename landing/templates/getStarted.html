<!-- vue -->
<script>
    const { createApp, ref , onMounted } = Vue;

    createApp({
        delimiters: ['[[',']]'],
        setup() {
            const description = ref('');
            const sections = ref('5');
            const language = ref('en');
            const generateClicked = ref(false);
        
            const updateDescription = (event) => {
                // Find the closest parent div of the clicked element
                const parentDiv = event.target.closest('.clickable-element');
                if (parentDiv) {
                  const spanElement = parentDiv.querySelector('span');
                  if (spanElement) {
                    description.value = spanElement.textContent;
                  }
                }
            };

            const submitForm = async () => {
                generateClicked.value = true
                const formData = {
                    description: description.value,
                    sections: sections.value,
                    language: language.value,
                };
                console.log(formData)
                try {
                    const response = await fetch('{% url 'createPage' %}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{csrf_token}}',

                        },
                        body: JSON.stringify(formData),
                    });
            
                    if (!response.ok) {

                        throw new Error('Network response was not ok');
                    }
            
                    const data = await response.json();

                    if (data.status == 'ok'){
                        
                        const createUrl = `{% url 'create' id='createPageId' %}`.replace('createPageId', data.pId);
                        window.location.href = createUrl;
                    }else{
                        const redirect = `{% url 'allProjects' %}`;
                        window.location.href = redirect;
                    }

                } catch (error) {
                    console.error('There was a problem with your fetch operation:', error);
                }
            };
        
            return { 
                description,
                sections,
                language,
                submitForm,
                updateDescription,
                generateClicked
            };
        },
    }).mount('.getStartedApp');


</script>


<script>
    let tryoutdivPc = document.querySelectorAll('.tryoutdivPc')
    let tryoutdivPcUntrimmed = document.querySelectorAll('.tryoutdivPcUntrimmed')

    function truncate(text){
        let maxLength = 45;
        return text.length > maxLength ? text.slice(0, maxLength - 3) + "..." : text;
    }



    // tryitout phone
    let tryOutLines = {
        all:[                
            "Keynote speech on digital transformation in the banking",
            "The most ridiculous moments in NBA history",
            "UX design case study",
            "Effective Time Management Strategies",
            "The Benefits of Regular Exercise",
            "Tips for Stress Management",
            "How to Improve Sleep Quality",
            "Healthy Recipes for Busy Lifestyles",
            "Building Strong Relationships",
            "Financial Planning for Beginners",
            "Green Living: Eco-Friendly Tips",
            "Exploring Mindfulness Practices",
            "Unlocking Creativity: Artistic Inspiration",
            "Career Development Strategies",
            "Home Organization Tips",
            "Exploring Travel Destinations",
            "Learning a New Language",
            "Introduction to Meditation",
            "Understanding Mental Health",
            "Gardening Tips for Beginners",
            "Effective Study Techniques",
            "Beginners Guide to Yoga"
        ],
        few:[  ]
    }

    
    function handleClickSmall() {
        selectRandomLines()
    }
    function selectRandomLines() {
        let remainingLines = tryOutLines.all.slice();
        tryOutLines.few = [];
        for (let i = 0; i < 3; i++) {
            if (remainingLines.length > 0) {
                let randomIndex = Math.floor(Math.random() * remainingLines.length);
                let selectedLine = remainingLines.splice(randomIndex, 1)[0];
                tryOutLines.few.push(selectedLine);

            }     
        }
        
        rotateLines()
    }

    selectRandomLines();

    let currentIndex = 0;
    function rotateLines() {
        let truncateElement = document.querySelector(".tryoutdiv");
        let tryoutdivUntrimmed = document.querySelector(".tryoutdivUntrimmed");
        truncateElement.classList.remove('fade-in');
        truncateElement.classList.add('fade-out');
        setTimeout(function() {
            currentIndex = (currentIndex + 1) % tryOutLines.few.length;
            let text = tryOutLines.few[currentIndex];

            truncateElement.textContent = truncate(text);
            tryoutdivUntrimmed.textContent = text;
            truncateElement.classList.remove('fade-out');
            truncateElement.classList.add('fade-in');
        }, 150);
    }

    rotateLines();
    setInterval(rotateLines, 3000);
    





    function handleClickLarge() {
        selectRandomLines()
        pcTryOut()
    }

    function pcTryOut(){
        tryoutdivPc.forEach((item,index)=>{                
            item.classList.remove('fade-in');
            item.classList.add('fade-out');
            let maxLength = 44;
            setTimeout(function() {
                item.textContent = tryOutLines.few[index]
                let text = tryOutLines.few[index];
                item.textContent = text;
                tryoutdivPcUntrimmed[index].textContent=truncate(text);
                item.classList.remove('fade-out');
                item.classList.add('fade-in');
            }, 150);
        })
    }

    function assignClickHandler() {
        const button = document.querySelector('.shufflButton');
        if (window.innerWidth < 768) {
            button.removeEventListener('click', handleClickLarge);
            button.addEventListener('click', handleClickSmall);
        } else {
            button.removeEventListener('click', handleClickSmall);
            button.addEventListener('click', handleClickLarge);
            pcTryOut();
        }
    }

    assignClickHandler();
    window.addEventListener('resize', assignClickHandler);

</script>
